<!-- ============================================================
     PWA Meta Tags - Add these to <head> in ALL HTML templates
     ============================================================ -->

<!-- PWA Manifest -->
<link rel="manifest" href="/static/manifest.json">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="96x96" href="/static/icons/icon-96.png">
<link rel="icon" type="image/png" sizes="48x48" href="/static/icons/icon-48.png">

<!-- Theme Color -->
<meta name="theme-color" content="#2f61f3">

<!-- PWA Specific -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nurse Study">

<!-- Apple Touch Icon -->
<link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-180.png">

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
      .then((registration) => {
        console.log('Service Worker registered:', registration);
      })
      .catch((error) => {
        console.warn('Service Worker registration failed:', error);
      });
  });
}
</script>
